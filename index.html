*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
.fi{opacity:0;transform:translateY(10px);animation:fi .5s ease forwards}
@keyframes fi{to{opacity:1;transform:translateY(0)}}
.hc{opacity:0;transform:scale(.7);animation:hp .3s ease forwards}
@keyframes hp{to{opacity:1;transform:scale(1)}}
.sd{stroke-dasharray:500;stroke-dashoffset:500;animation:dl 1.5s ease forwards .4s}
@keyframes dl{to{stroke-dashoffset:0}}

@keyframes pa{0%,100%{opacity:1;transform:translateX(0)}50%{opacity:.4;transform:translateX(6px)}}
.tip-wrap{position:relative;display:inline-flex;align-items:center}
.tip-icon{position:absolute;right:-20px;top:50%;transform:translateY(-50%);display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:8px;background:rgba(255,255,255,0.12);font-size:10px;color:rgba(255,255,255,0.5);cursor:help;font-weight:700;z-index:5;font-family:'Outfit',sans-serif}
.tip-bubble{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;font-size:14px;color:rgba(255,255,255,0.9);width:260px;line-height:1.5;z-index:200;text-align:left;box-shadow:0 8px 24px rgba(0,0,0,0.6);pointer-events:none;font-family:'Outfit',sans-serif;font-weight:400}

const fmt=(n)=>{if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toLocaleString("en-US")};
const fmtUSD=(n)=>"$"+fmt(n)+" USD";
const MO=["Jul","Ago","Sep","Oct","Nov","Dic","Ene","Feb","Mar","Abr","May","Jun"];

function Tip({id,children}){
  const[show,setShow]=useState(false);
  const text=TIPS[id];
  if(!text)return children;
  return(
    <span className="tip-wrap" onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)} onClick={e=>{e.stopPropagation();setShow(!show)}}>
      {children}
      <span className="tip-icon">?</span>
      {show&&<span className="tip-bubble">{text}</span>}
    </span>
  );
}

function AN({value}){
  const[d,setD]=useState(0);const r=useRef();
  useEffect(()=>{let s=null;const step=(t)=>{if(!s)s=t;const p=Math.min((t-s)/1800,1);setD((1-Math.pow(1-p,3))*value);if(p<1)r.current=requestAnimationFrame(step)};r.current=requestAnimationFrame(step);return()=>cancelAnimationFrame(r.current)},[value]);
  return React.createElement('span',null,value>=1000?fmt(Math.round(d)):d.toFixed(1));
}

function hcol(v){return v>=90?"#00ff87":v>=75?"#1db954":v>=60?"#1a8f42":v>=45?"#166b34":v>=30?"#124a26":"#0e2f1a"}

const TOTAL=13;

function App(){
  const[s,setS]=useState(0);const[k,setK]=useState(0);
  const go=(i)=>{setS(i);setK(x=>x+1)};
  const next=()=>s<TOTAL-1&&go(s+1);
  const prev=()=>s>0&&go(s-1);
  useEffect(()=>{const h=(e)=>{if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();if(s<TOTAL-1){setS(p=>p+1);setK(p=>p+1)}}if(e.key==="ArrowLeft"){if(s>0){setS(p=>p-1);setK(p=>p+1)}}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h)},[s]);
  const tr=useRef(null);
  const slides=[
    React.createElement(Intro,{key:"s0"}),
    React.createElement(SImp,{key:"s1"+k}),React.createElement(SCli,{key:"s2"+k}),
    React.createElement(SRev,{key:"s3"+k}),React.createElement(SBrand,{key:"s4"+k}),
    React.createElement(STech,{key:"s5"+k}),React.createElement(SSov,{key:"s6"+k}),
    React.createElement(SKw,{key:"s7"+k}),React.createElement(SCat,{key:"s8"+k}),
    React.createElement(SProd,{key:"s9"+k}),React.createElement(SHeat,{key:"s10"+k}),
    React.createElement(SFinal,{key:"s11"+k}),React.createElement(SRecog,{key:"s12"+k}),
  ];
  return(
    <div style={R.root} onTouchStart={e=>{tr.current=e.touches[0].clientX}} onTouchEnd={e=>{if(tr.current===null)return;const d=tr.current-e.changedTouches[0].clientX;if(Math.abs(d)>50){d>0?next():prev()}tr.current=null}}>
      <div style={R.prog}>{Array.from({length:TOTAL}).map((_,i)=>(<div key={i} onClick={()=>go(i)} style={{height:4,borderRadius:4,transition:"all .4s",cursor:"pointer",background:i<=s?"#00ff87":"rgba(255,255,255,0.1)",flex:i===s?2.5:1}}/>))}</div>
      <div style={R.wrap} key={k}>{slides[s]}</div>
      <div style={R.nav}>
        <button style={{...R.btn,opacity:s===0?.3:1}} onClick={prev} disabled={s===0}>‹ Anterior</button>
        <span style={R.cnt}>{s+1}/{TOTAL}</span>
        <button style={{...R.btn,opacity:s===TOTAL-1?.3:1}} onClick={next} disabled={s===TOTAL-1}>Siguiente ›</button>
      </div>
    </div>
  );
}

function StCard({v,l,sub,down,tip}){
  const inner=(
    <div style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"14px 14px",flex:1,display:"flex",flexDirection:"column",gap:3,alignItems:"center"}}>
      <span style={{fontSize:22,fontWeight:800,fontFamily:"'Space Mono',monospace",color:down?"#ff5555":"#00ff87"}}>{v}</span>
      <span style={{fontSize:14,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1}}>{l}</span>
      {sub&&<span style={{fontSize:14,color:down?"#ff5555":"#00ff87"}}>{sub}</span>}
    </div>
  );
  if(tip)return React.createElement(Tip,{id:tip},inner);
  return inner;
}

/* ═══ TECH ═══ */
function STech(){

/* ═══ SHARED ═══ */
function Bdg({v,small}){
  return(
    <div style={{background:"rgba(0,255,135,0.1)",border:"1px solid rgba(0,255,135,0.2)",borderRadius:16,padding:small?"3px 10px":"5px 14px",fontSize:small?14:15,fontWeight:600,color:"#00ff87",marginTop:small?4:0}}>
      ↑ {v}% vs M25
    </div>
  );

function Spark({data,dk,c}){
  const vals=data.map(d=>d[dk]);
  const max=Math.max(...vals),min=Math.min(...vals),range=max-min||1;
  const w=260,h=55;
  const pts=vals.map((v,i)=>(i/(vals.length-1))*w+","+(h-((v-min)/range)*h)).join(" ");
  return(
    <svg viewBox={"0 0 "+w+" "+h} style={{width:260,height:55,marginTop:6}} xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id={"g-"+dk} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity=".25"/><stop offset="100%" stopColor={c} stopOpacity="0"/></linearGradient></defs>
      <polygon points={"0,"+h+" "+pts+" "+w+","+h} fill={"url(#g-"+dk+")"}/>
      <polyline points={pts} fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="sd"/>
    </svg>
  );
}
