const fmt=(n)=>{if(n===null||n===undefined)return"—";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return Math.round(n).toLocaleString("en-US")};
const fmtUSD=(n)=>n===null||n===undefined?"—":"$"+fmt(n);
const p2=(v)=>v===null||v===undefined?"—":parseFloat(v).toFixed(2)+"%";

function Tip({id,children}){
  const[show,setShow]=useState(false);
  const tips={
    ctr:"Click-Through Rate: clics ÷ impresiones × 100.",
    conv:"Porcentaje de visitas orgánicas que terminaron en compra.",
    partDigital:"Participación SEO en la venta digital (Paid + Orgánico).",
    partTotal:"Participación SEO en la venta total. M26 incluye venta asistida en el denominador.",
    nonBrand:"Tráfico de usuarios que NO buscaron tu marca directamente. Indica conquista de mercado.",
    indexation:"Páginas de tu sitio incluidas en el índice de Google.",
    weightedPos:"Posición promedio ponderada por volumen de clics. Menor = mejor.",
    asistida:"En M26 se separó la venta asistida del canal SEO. Las cifras reflejan venta orgánica pura.",
    lcp:"Largest Contentful Paint: tiempo que tarda en cargar el elemento principal. Meta: < 2.5s",
    inp:"Interaction to Next Paint: respuesta a interacciones del usuario. Meta: < 200ms",
    cls:"Cumulative Layout Shift: estabilidad visual. Meta: < 0.1",
  };
  if(!tips[id])return children;
  return(
    <span className="tip-wrap" onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      {children}
      <span className="tip-icon">?</span>
      {show&&<span className="tip-bubble">{tips[id]}</span>}
    </span>
  );
}

function AN({value,decimals=0,prefix="",suffix=""}){
  const[d,setD]=useState(0);const r=useRef();
  useEffect(()=>{
    if(value===null||value===undefined){setD(value);return;}
    let s=null;
    const step=(t)=>{if(!s)s=t;const p=Math.min((t-s)/1600,1);const v=(1-Math.pow(1-p,3))*value;setD(v);if(p<1)r.current=requestAnimationFrame(step)};
    r.current=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(r.current);
  },[value]);
  if(d===null||d===undefined)return React.createElement('span',null,'—');
  const display=decimals>0?d.toFixed(decimals):fmt(Math.round(d));
  return React.createElement('span',null,prefix+display+suffix);
}

function Bdg({v,label,small}){
  if(v===null||v===undefined)return <span style={{fontSize:small?11:13,color:"rgba(255,255,255,0.3)"}}>Sin dato M25</span>;

    <div style={{display:"inline-flex",alignItems:"center",gap:4,background:pos?"rgba(0,255,135,0.1)":"rgba(255,80,80,0.1)",border:"1px solid "+(pos?"rgba(0,255,135,0.25)":"rgba(255,80,80,0.25)"),borderRadius:20,padding:small?"2px 10px":"4px 14px",fontSize:small?11:13,fontWeight:600,color:pos?"#00ff87":"#ff5050"}}>
      {pos?"↑":"↓"} {Math.abs(v).toFixed(2)}%{label?" "+label:""}
    </div>
  );
}

/* Sparkline + trend line animada */
function Spark({data,dk,color,showTrend=true}){
  const vals=data.map(d=>d[dk]);
  const max=Math.max(...vals),min=Math.min(...vals),range=max-min||1;
  const W=300,H=60;
  const xStep=W/(vals.length-1);
  const pts=vals.map((v,i)=>[i*xStep,(H-((v-min)/range)*(H-8)+4)]);
  const ptStr=pts.map(p=>p[0]+","+p[1]).join(" ");
  const uid=dk+color.replace(/[^a-z0-9]/gi,"");
  // Trend line (linear regression)
  const n=vals.length;
  const xm=(n-1)/2;
  const ym=vals.reduce((a,b)=>a+b,0)/n;
  const slope=vals.reduce((s,v,i)=>s+(i-xm)*(v-ym),0)/vals.reduce((s,_,i)=>s+(i-xm)**2,0)||0;
  const y0=(H-((ym-slope*xm-min)/range)*(H-8)+4);
  const y1=(H-((ym+slope*(n-1-xm)-min)/range)*(H-8)+4);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:340,height:60,marginTop:4}} xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id={uid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`0,${H} ${ptStr} ${W},${H}`} fill={`url(#${uid})`}/>
      <polyline points={ptStr} fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="sd" style={{"--dash":"1200"}}/>
      {showTrend&&<line x1="0" y1={y0} x2={W} y2={y1} stroke={color} strokeWidth="1.5" strokeDasharray="5,4" opacity="0.55" className="sd"/>}
      {pts.map((p,i)=>i===pts.length-1&&<circle key={i} cx={p[0]} cy={p[1]} r="4" fill={color} stroke="#000" strokeWidth="1.5"/>)}
    </svg>
  );
}

/* Bar chart animado M25 vs M26 */
function BarChart({M25,M26,label,color}){
  const[anim,setAnim]=useState(false);
  useEffect(()=>{setTimeout(()=>setAnim(true),100)},[]);
  const mx=Math.max(M25||0,M26||0)||1;
  const pct=(v)=>v?((v/mx)*100).toFixed(1)+"%":"0%";
  return(
    <div style={{width:"100%",maxWidth:360}}>
      <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1,marginBottom:6,textAlign:"center"}}>{label}</p>
      {[{v:M25,l:"M25",c:"rgba(255,255,255,0.2)"},{v:M26,l:"M26",c:color}].map(({v,l,c})=>(
        <div key={l} style={{marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{l}</span>
            <span style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"rgba(255,255,255,0.6)"}}>{fmt(v)}</span>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,0.05)",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:anim?pct(v):"0%",background:c,borderRadius:4,transition:"width 1.2s cubic-bezier(0.4,0,0.2,1)"}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

function cwvColor(metric,val){
  const v=parseFloat(val);
  if(isNaN(v))return"rgba(255,255,255,0.4)";
  if(metric==="lcp")return v<=2.5?"#00ff87":v<=4?"#fbbf24":"#ff5050";
  if(metric==="inp")return v<=200?"#00ff87":v<=500?"#fbbf24":"#ff5050";
  if(metric==="cls")return v<=0.1?"#00ff87":v<=0.25?"#fbbf24":"#ff5050";
  return"rgba(255,255,255,0.4)";
}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,width:"100%"}}>
        {stats.map((s,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"8px 6px",display:"flex",flexDirection:"column",gap:2,alignItems:"center",border:"1px solid "+bd.color+"15"}}>
            <span style={{fontSize:14,fontWeight:800,fontFamily:"'Space Mono',monospace",color:bd.color,textAlign:"center",lineHeight:1.1}}>{s.v}</span>
            <span style={{fontSize:9,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1,textAlign:"center"}}>{s.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SlideMessage({bd,country}){
  const cData=COUNTRIES[country];
  return(
    <div style={S.center}>
      <div style={{fontSize:48,animation:"pulse 2s ease infinite"}}>💬</div>
      <p style={{fontSize:12,color:bd.color+"99",textTransform:"uppercase",letterSpacing:3,fontWeight:600}}>Sugerencia Estratégica M27</p>
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid "+bd.color+"25",borderRadius:16,padding:"20px 24px",maxWidth:420,marginTop:4}}>
        <p style={{fontSize:15,fontWeight:500,lineHeight:1.65,color:"rgba(255,255,255,0.82)",textAlign:"center"}}>{bd.suggestion}</p>
      </div>
      <div style={{width:48,height:2,background:"linear-gradient(90deg,transparent,"+bd.color+",transparent)",marginTop:12}}/>
      <p style={{marginTop:8,fontSize:14,fontWeight:600,color:"rgba(255,255,255,0.35)"}}>¡Adelante {bd.label} {cData.name}! 💪</p>
      <p style={{fontSize:12,color:"rgba(255,255,255,0.2)"}}>Preparados para superar M26</p>
    </div>
  );
}

function SlideRecognition({bd}){
  const{award,text}=bd.recognition;
  return(
    <div style={S.center}>
      <div style={{fontSize:52,animation:"pulse 2s ease infinite"}}>{award?"🏆":"🚀"}</div>
      {award?(
        <>
          <p style={{fontSize:12,color:"rgba(255,200,50,0.65)",textTransform:"uppercase",letterSpacing:3,fontWeight:600}}>Reconocimiento M26</p>
          <h2 style={{fontSize:20,fontWeight:800,lineHeight:1.5,maxWidth:380,textAlign:"center",background:"linear-gradient(135deg,#ffd700,#ffb300)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{text}</h2>
          <div style={{width:50,height:2,background:"linear-gradient(90deg,transparent,#ffd700,transparent)",marginTop:8}}/>
        </>
      ):(
        <>
          <p style={{fontSize:12,color:bd.color+"99",textTransform:"uppercase",letterSpacing:3,fontWeight:600}}>Destacado M26</p>
          <h2 style={{fontSize:17,fontWeight:600,lineHeight:1.6,maxWidth:360,textAlign:"center",color:"rgba(255,255,255,0.75)"}}>{text}</h2>
        </>
      )}
    </div>
  );
}

/* ═══ MAIN APP ═══ */
const SLIDE_LABELS=["Inicio","Impresiones","Clics","Visitas","Revenue","No Marca","Técnico","Keywords","Categorías","Productos","Resumen","Mensaje","Reconocimiento"];
const TOTAL=SLIDE_LABELS.length;

function App(){
  const[country,setCountry]=useState(null);
  const[brand,setBrand]=useState(null);
  const[slide,setSlide]=useState(0);
  const[animKey,setAnimKey]=useState(0);
  const touchRef=useRef(null);

  const go=useCallback((i)=>{setSlide(i);setAnimKey(k=>k+1)},[]);
  const next=useCallback(()=>slide<TOTAL-1&&go(slide+1),[slide,go]);
  const prev=useCallback(()=>slide>0&&go(slide-1),[slide,go]);

  const selectCountry=(code)=>{
    setCountry(code);
    const firstBrand=Object.keys(COUNTRIES[code].brands)[0];
    setBrand(firstBrand);
    setSlide(0);setAnimKey(0);
  };
  const switchBrand=(b)=>{setBrand(b);setAnimKey(k=>k+1)};

  useEffect(()=>{
    const h=(e)=>{
      if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();next();}
      if(e.key==="ArrowLeft"){prev();}
      if(e.key==="Escape"&&country){setCountry(null);setBrand(null);setSlide(0);}
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[next,prev,country]);

  if(!country){
    return(<div style={R.root}><CountrySelector onSelect={selectCountry}/></div>);
  }

  const cData=COUNTRIES[country];
  const bd=cData.brands[brand];
  const brands=Object.keys(cData.brands);

  const slides=[
    <SlideIntro key={`intro-${animKey}`} country={country} brands={brands} activeBrand={brand} onSwitch={switchBrand}/>,
    <SlideImpressions key={`imp-${animKey}`} bd={bd}/>,
    <SlideClicks key={`cli-${animKey}`} bd={bd}/>,
    <SlideVisits key={`vis-${animKey}`} bd={bd}/>,
    <SlideRevenue key={`rev-${animKey}`} bd={bd}/>,
    <SlideBrand key={`brand-${animKey}`} bd={bd}/>,
    <SlideTech key={`tech-${animKey}`} bd={bd}/>,
    <SlideKeywords key={`kw-${animKey}`} bd={bd}/>,
    <SlideCategories key={`cat-${animKey}`} bd={bd}/>,
    <SlideProducts key={`prod-${animKey}`} bd={bd}/>,
    <SlideSummary key={`sum-${animKey}`} bd={bd} country={country}/>,
    <SlideMessage key={`msg-${animKey}`} bd={bd} country={country}/>,
    <SlideRecognition key={`rec-${animKey}`} bd={bd}/>,
  ];

  return(
    <div style={R.root}
      onTouchStart={e=>{touchRef.current=e.touches[0].clientX}}
      onTouchEnd={e=>{
        if(touchRef.current===null)return;
        const d=touchRef.current-e.changedTouches[0].clientX;
        if(Math.abs(d)>50){d>0?next():prev();}
        touchRef.current=null;
      }}>
      {/* Top bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 0",flexShrink:0,gap:8}}>
        <button onClick={()=>{setCountry(null);setBrand(null);setSlide(0);}}
          style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:18,padding:0,lineHeight:1}}>←</button>
        <div style={{flex:1,display:"flex",gap:3}}>
          {SLIDE_LABELS.map((_,i)=>(
            <div key={i} onClick={()=>go(i)}
              style={{height:3,borderRadius:3,cursor:"pointer",background:i<=slide?bd.color:"rgba(255,255,255,0.08)",flex:i===slide?2.5:1,transition:"all .3s"}}/>
          ))}
        </div>
        {brands.length>1&&(
          <BrandTabs brands={brands} active={brand} onSwitch={switchBrand} country={country}/>
        )}
      </div>
      {/* Slide label */}
      <div style={{textAlign:"center",padding:"4px 0",flexShrink:0}}>
        <span style={{fontSize:10,color:"rgba(255,255,255,0.2)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'Space Mono',monospace"}}>
          {cData.flag} {bd.label} · {SLIDE_LABELS[slide]}
        </span>
      </div>
      {/* Slide area */}
      <div style={R.wrap} key={animKey}>{slides[slide]}</div>
      {/* Nav */}
      <div style={R.nav}>
        <button style={{...R.btn,opacity:slide===0?.25:1}} onClick={prev} disabled={slide===0}>‹ Anterior</button>
        <span style={R.cnt}>{slide+1}/{TOTAL}</span>
        <button style={{...R.btn,opacity:slide===TOTAL-1?.25:1}} onClick={next} disabled={slide===TOTAL-1}>Siguiente ›</button>
      </div>
    </div>
  );
}

/* ═══ SHARED STYLES ═══ */
const R={
  root:{fontFamily:"'Outfit',sans-serif",background:"linear-gradient(160deg,#080808 0%,#0d1a0f 45%,#080808 100%)",height:"100vh",color:"#fff",display:"flex",flexDirection:"column",overflow:"hidden",userSelect:"none"},
  wrap:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"6px 16px 4px",overflow:"hidden"},
  nav:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 14px 12px",flexShrink:0},
  btn:{background:"none",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",fontFamily:"'Outfit',sans-serif",fontSize:13,padding:"5px 14px",borderRadius:20,cursor:"pointer"},
  cnt:{fontSize:12,color:"rgba(255,255,255,0.25)",fontFamily:"'Space Mono',monospace"},
};
const S={
  center:{display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",gap:8,width:"100%",maxWidth:500,animation:"fi .45s ease"},
  label:{fontSize:12,color:"rgba(255,255,255,0.4)",letterSpacing:2.5,textTransform:"uppercase",fontWeight:400,margin:0},
  mega:{fontSize:52,fontWeight:900,fontFamily:"'Space Mono',monospace",lineHeight:1,margin:"2px 0"},
  lbig:{fontSize:17,fontWeight:600,color:"rgba(255,255,255,0.75)"},
  sec:{fontSize:18,fontWeight:800,color:"#fff"},
  pill:{background:"rgba(255,255,255,0.05)",borderRadius:20,padding:"3px 12px",fontSize:12},
  statPill:{display:"flex",flexDirection:"column",gap:2,background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"8px 22px",border:"1px solid rgba(255,255,255,0.06)"},
  microCard:{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 14px",display:"flex",flexDirection:"column",gap:3,alignItems:"center",border:"1px solid rgba(255,255,255,0.05)"},
  microLabel:{fontSize:10,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1},
  warnBadge:{background:"rgba(255,200,50,0.06)",border:"1px solid rgba(255,200,50,0.12)",borderRadius:8,padding:"5px 12px",fontSize:11,color:"rgba(255,200,50,0.75)",lineHeight:1.4},
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
